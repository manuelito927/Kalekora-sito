<script>
const menuBtn = document.querySelector(".menu-btn");
const mobileMenu = document.querySelector(".mobile-menu");

menuBtn.onclick = () => mobileMenu.classList.toggle("active");

const sponsors = ["Red Bull","Moët","Aperol","Campari"];
let i = 0;
const el = document.getElementById("sponsorName");

function changeSponsor(d){
  i=(i+d+sponsors.length)%sponsors.length;
  el.textContent=sponsors[i];
}

setInterval(()=>changeSponsor(1),3000);

window.addEventListener('load', () => {
  const revealElements = document.querySelectorAll(
".intro, .info-section, .form-section, .map, .partners, .footer"
  );

  revealElements.forEach(el => el.classList.add("reveal"));

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("active");
        observer.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.05,
    rootMargin: "0px 0px 80px 0px"
  });

  revealElements.forEach(el => observer.observe(el));
});
  // Fix: forza il check sugli elementi già visibili al caricamento
  setTimeout(() => {
    revealElements.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight) {
        el.classList.add("active");
      }
    });
  }, 100);

</script>
